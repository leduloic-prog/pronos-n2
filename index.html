<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pronos · N2 Poule 3</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0f14;
      --bg2: #13161e;
      --bg3: #1a1e28;
      --card: #1e2230;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --accent: #4f8ef7;
      --accent2: #7c6af7;
      --green: #3ecf8e;
      --red: #f76f6f;
      --amber: #f5a623;
      --text: #e8eaf0;
      --text2: #8b90a0;
      --text3: #555a6e;
      --radius: 12px;
      --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
    }

    /* ── LOGIN ─────────────────────────────────────── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: radial-gradient(ellipse at 30% 20%, rgba(79,142,247,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 80%, rgba(124,106,247,0.10) 0%, transparent 60%),
                  var(--bg);
    }
    .login-box {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-logo {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
    }
    .login-title {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #e8eaf0 0%, #8b90a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .login-sub {
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 2.5rem;
    }
    .login-input {
      width: 100%;
      padding: 14px 18px;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
      outline: none;
    }
    .login-input:focus { border-color: var(--accent); }
    .login-input::placeholder { color: var(--text3); }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }

    /* ── APP LAYOUT ─────────────────────────────────── */
    #app { display: none; min-height: 100vh; flex-direction: column; }
    #app.visible { display: flex; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,15,20,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-brand {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
    }
    .topbar-brand span { color: var(--accent); }
    .user-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .user-chip:hover { border-color: var(--border2); color: var(--text); }
    .user-avatar {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600;
    }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      background: var(--bg);
      overflow-x: auto;
    }
    .tab {
      padding: 0 18px;
      height: 46px;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.2s;
      background: none;
      border-left: none;
      border-right: none;
      border-top: none;
      font-family: 'DM Sans', sans-serif;
    }
    .tab:hover { color: var(--text2); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-icon { font-size: 15px; }

    .main-content {
      flex: 1;
      padding: 1.5rem;
      max-width: 700px;
      margin: 0 auto;
      width: 100%;
    }

    .section { display: none; }
    .section.active { display: block; }

    /* ── JOURNÉE SELECTOR ──────────────────────────── */
    .j-scroll {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 1.25rem;
      scrollbar-width: none;
    }
    .j-scroll::-webkit-scrollbar { display: none; }
    .j-btn {
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .j-btn:hover { border-color: var(--border2); color: var(--text); }
    .j-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── MATCH CARD ─────────────────────────────────── */
    .match-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    .match-card:hover { border-color: var(--border2); }
    .match-meta {
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .match-teams {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .match-teams .vs { font-weight: 400; color: var(--text3); font-family: 'DM Sans', sans-serif; }
    .prono-btns { display: flex; gap: 8px; }
    .prono-btn {
      flex: 1;
      padding: 9px 6px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      line-height: 1.3;
    }
    .prono-btn:hover:not(:disabled) { border-color: var(--border2); color: var(--text); }
    .prono-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .prono-btn .btn-num { font-size: 16px; font-weight: 700; font-family: 'Syne', sans-serif; display: block; }
    .prono-btn .btn-lbl { font-size: 10px; color: var(--text3); display: block; margin-top: 1px; }
    .prono-btn.sel-1 { background: rgba(79,142,247,0.15); border-color: var(--accent); color: #fff; }
    .prono-btn.sel-1 .btn-lbl { color: rgba(255,255,255,0.6); }
    .prono-btn.sel-N { background: rgba(139,144,160,0.15); border-color: #8b90a0; color: #fff; }
    .prono-btn.sel-N .btn-lbl { color: rgba(255,255,255,0.6); }
    .prono-btn.sel-2 { background: rgba(124,106,247,0.15); border-color: var(--accent2); color: #fff; }
    .prono-btn.sel-2 .btn-lbl { color: rgba(255,255,255,0.6); }

    .score-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .score-lbl { font-size: 11px; color: var(--text3); }
    .score-in {
      width: 48px;
      padding: 6px 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }
    .score-in:focus { border-color: var(--accent); }
    .score-sep { color: var(--text3); font-size: 13px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 500;
    }
    .badge-ok { background: rgba(62,207,142,0.15); color: var(--green); border: 1px solid rgba(62,207,142,0.3); }
    .badge-ok3 { background: rgba(79,142,247,0.15); color: var(--accent); border: 1px solid rgba(79,142,247,0.3); }
    .badge-ko { background: rgba(247,111,111,0.15); color: var(--red); border: 1px solid rgba(247,111,111,0.3); }
    .badge-lock { background: rgba(255,255,255,0.05); color: var(--text2); border: 1px solid var(--border); }
    .prono-count { font-size: 11px; color: var(--text3); margin-top: 8px; }

    /* ── RÉSULTATS ──────────────────────────────────── */
    .btn-validate {
      padding: 7px 14px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-validate:hover { opacity: 0.85; }

    /* ── CLASSEMENT ─────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      text-align: center;
    }
    .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }
    .stat-lbl { font-size: 11px; color: var(--text3); margin-top: 4px; }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-rank {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      width: 28px;
      text-align: center;
      color: var(--text3);
    }
    .lb-rank.gold { color: #f5a623; }
    .lb-rank.silver { color: #9ca3af; }
    .lb-rank.bronze { color: #cd7f32; }
    .lb-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600;
      font-family: 'Syne', sans-serif;
      flex-shrink: 0;
    }
    .lb-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); }
    .lb-me { font-size: 11px; color: var(--text3); font-weight: 400; }
    .lb-pts {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .lb-sub { font-size: 11px; color: var(--text3); text-align: right; }
    .lb-pts-wrap { text-align: right; }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text3);
      font-size: 14px;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1rem;
    }

    @media (max-width: 480px) {
      .main-content { padding: 1rem; }
      .stats-grid { grid-template-columns: repeat(3,1fr); gap: 8px; }
      .stat-val { font-size: 22px; }
    }
  </style>
</head>

<!-- ══ LOGIN ══════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🤾 Nationale 2 · Poule 3</div>
    <h1 class="login-title">Pronos<br/>de l'équipe</h1>
    <p class="login-sub">Entre ton prénom pour accéder à l'appli</p>
    <input class="login-input" id="name-input" placeholder="Ton prénom..." maxlength="20" autocomplete="off"/>
    <button class="btn-primary" onclick="login()">Entrer dans l'appli →</button>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════ -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">N2 <span>·</span> Poule 3</div>
    <div class="user-chip" onclick="logout()" id="user-chip">
      <div class="user-avatar" id="topbar-avatar"></div>
      <span id="topbar-name"></span>
      <span style="color:var(--text3)">· quitter</span>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('pronos')"><span class="tab-icon">🎯</span> Mes pronos</button>
    <button class="tab" onclick="switchTab('resultats')"><span class="tab-icon">📋</span> Résultats</button>
    <button class="tab" onclick="switchTab('classement')"><span class="tab-icon">🏆</span> Classement</button>
  </div>

  <div class="main-content">

    <!-- PRONOS -->
    <div class="section active" id="tab-pronos">
      <div class="j-scroll" id="j-pronos"></div>
      <div id="pronos-list"></div>
    </div>

    <!-- RÉSULTATS -->
    <div class="section" id="tab-resultats">
      <div class="section-title">Saisir les résultats</div>
      <div class="j-scroll" id="j-results"></div>
      <div id="results-list"></div>
    </div>

    <!-- CLASSEMENT -->
    <div class="section" id="tab-classement">
      <div class="stats-grid" id="my-stats"></div>
      <div class="section-title">Classement général</div>
      <div id="leaderboard"></div>
    </div>

  </div>
</div>

  // ══ STATE ══════════════════════════════════════════
  const COLORS_BG = ['#1e3a5f','#1a3d2b','#3d2a1a','#3d1a2a','#1a2a3d','#2a1a3d','#3d3a1a'];
  const COLORS_FG = ['#7eb8f7','#6ee0a8','#f0a06e','#f06e9a','#6eaaf0','#a06ef0','#f0e06e'];

  let currentUser = '';
  let activeJ = { pronos: 17, results: 17 };
  let dbData = { pronos: {}, scores: {}, results: {} };

  function getUserColor(name) {
    let h = 0;
    for (const c of name) h = (h * 31 + c.charCodeAt(0)) % COLORS_BG.length;
    return [COLORS_BG[h], COLORS_FG[h]];
  }

  function getResult(idx) {
    return dbData.results[idx] || PRESET_RESULTS[idx] || null;
  }

  function outcome(h, a) { return h > a ? '1' : h === a ? 'N' : '2'; }

  function calcPoints(user) {
    let pts = 0, correct = 0, exact = 0, total = 0;
    const up = dbData.pronos[user] || {};
    const us = dbData.scores[user] || {};
    MATCHES.forEach((m, i) => {
      const res = getResult(i);
      if (!res) return;
      const real = outcome(res.h, res.a);
      const myP = up[i];
      const myS = us[i];
      if (myP) {
        total++;
        if (myP === real) {
          pts += 1; correct++;
          if (myS && parseInt(myS.h) === res.h && parseInt(myS.a) === res.a) { pts += 2; exact++; }
        }
      }
    });
    return { pts, correct, exact, total };
  }

  // ══ FIREBASE SYNC ══════════════════════════════════
  function listenDB() {
    onValue(ref(db, 'hb_n2'), (snap) => {
      if (snap.exists()) {
        const d = snap.val();
        dbData.pronos = d.pronos || {};
        dbData.scores = d.scores || {};
        dbData.results = d.results || {};
      }
      renderAll();
    });
  }

  async function writePath(path, value) {
    await set(ref(db, path), value);
  }

  // ══ LOGIN ══════════════════════════════════════════
  window.login = function () {
    const n = document.getElementById('name-input').value.trim();
    if (!n) return;
    currentUser = n;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    const [bg, fg] = getUserColor(n);
    document.getElementById('topbar-avatar').style.background = bg;
    document.getElementById('topbar-avatar').style.color = fg;
    document.getElementById('topbar-avatar').textContent = n.slice(0, 2).toUpperCase();
    document.getElementById('topbar-name').textContent = n;
    listenDB();
  };

  window.logout = function () {
    currentUser = '';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').classList.remove('visible');
    document.getElementById('name-input').value = '';
  };

  // ══ NAVIGATION ═════════════════════════════════════
  window.switchTab = function (tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['pronos', 'resultats', 'classement'][i] === tab);
    });
    document.querySelectorAll('.section').forEach((s, i) => {
      s.classList.toggle('active', ['tab-pronos', 'tab-resultats', 'tab-classement'][i] === 'tab-' + tab);
    });
    renderAll();
  };

  window.setJ = function (key, j) { activeJ[key] = j; renderAll(); };

  function renderJFilter(containerId, key) {
    const el = document.getElementById(containerId);
    const journees = [...new Set(MATCHES.map(m => m.j))];
    el.innerHTML = journees.map(j =>
      `<button class="j-btn${activeJ[key] === j ? ' active' : ''}" onclick="setJ('${key}',${j})">J${j < 10 ? '0' + j : j}</button>`
    ).join('');
    // Scroll auto vers la journée active
    setTimeout(() => {
      const active = el.querySelector('.j-btn.active');
      if (active) active.scrollIntoView({ inline: 'center', behavior: 'smooth' });
    }, 50);
  }

  // ══ RENDER PRONOS ══════════════════════════════════
  function renderPronos() {
    renderJFilter('j-pronos', 'pronos');
    const el = document.getElementById('pronos-list');
    const myP = dbData.pronos[currentUser] || {};
    const myS = dbData.scores[currentUser] || {};
    const list = MATCHES.map((m, i) => ({ m, i })).filter(({ m }) => m.j === activeJ.pronos);

    el.innerHTML = list.map(({ m, i }) => {
      const res = getResult(i);
      const locked = !!res;
      const myProno = myP[i] || null;
      const myScore = myS[i] || null;

      let badgeHtml = '';
      if (res) {
        const real = outcome(res.h, res.a);
        if (myProno) {
          if (myProno === real) {
            const isExact = myScore && parseInt(myScore.h) === res.h && parseInt(myScore.a) === res.a;
            badgeHtml = isExact
              ? '<span class="badge badge-ok3">+3pts score exact</span>'
              : '<span class="badge badge-ok">+1pt 1N2 correct</span>';
          } else {
            badgeHtml = '<span class="badge badge-ko">Raté</span>';
          }
        }
        badgeHtml += ` <span class="badge badge-lock">${res.h} - ${res.a}</span>`;
      }

      const counts = countPronos(i);
      const total = counts['1'] + counts['N'] + counts['2'];

      const s1 = myProno === '1' ? 'sel-1' : '';
      const sN = myProno === 'N' ? 'sel-N' : '';
      const s2 = myProno === '2' ? 'sel-2' : '';
      const dis = locked ? 'disabled' : '';

      return `<div class="match-card">
        <div class="match-meta">${m.date} · ${m.time} ${badgeHtml}</div>
        <div class="match-teams">${m.home} <span class="vs">vs</span> ${m.away}</div>
        <div class="prono-btns">
          <button class="prono-btn ${s1}" onclick="setProno(${i},'1')" ${dis}>
            <span class="btn-num">1</span>
            <span class="btn-lbl">${m.home.split(' ')[0]}</span>
          </button>
          <button class="prono-btn ${sN}" onclick="setProno(${i},'N')" ${dis}>
            <span class="btn-num">N</span>
            <span class="btn-lbl">Nul</span>
          </button>
          <button class="prono-btn ${s2}" onclick="setProno(${i},'2')" ${dis}>
            <span class="btn-num">2</span>
            <span class="btn-lbl">${m.away.split(' ')[0]}</span>
          </button>
        </div>
        ${!locked && myProno ? `
        <div class="score-row">
          <span class="score-lbl">Score exact (+2pts bonus) :</span>
          <input class="score-in" type="number" min="0" max="99" id="sh${i}"
            value="${myScore ? myScore.h : ''}" placeholder="?" onchange="setScore(${i})"/>
          <span class="score-sep">–</span>
          <input class="score-in" type="number" min="0" max="99" id="sa${i}"
            value="${myScore ? myScore.a : ''}" placeholder="?" onchange="setScore(${i})"/>
        </div>` : ''}
        ${total > 0 ? `<div class="prono-count">${total} prono${total > 1 ? 's' : ''} posé${total > 1 ? 's' : ''} sur ce match</div>` : ''}
      </div>`;
    }).join('');
  }

  function countPronos(idx) {
    const c = { '1': 0, 'N': 0, '2': 0 };
    Object.values(dbData.pronos).forEach(up => { if (up[idx]) c[up[idx]]++; });
    return c;
  }

  window.setProno = async function (idx, val) {
    if (!dbData.pronos[currentUser]) dbData.pronos[currentUser] = {};
    dbData.pronos[currentUser][idx] = val;
    await writePath(`hb_n2/pronos/${currentUser}/${idx}`, val);
  };

  window.setScore = async function (idx) {
    const h = document.getElementById('sh' + idx)?.value;
    const a = document.getElementById('sa' + idx)?.value;
    if (h === '' || a === '') return;
    if (!dbData.scores[currentUser]) dbData.scores[currentUser] = {};
    const score = { h: parseInt(h), a: parseInt(a) };
    dbData.scores[currentUser][idx] = score;
    await writePath(`hb_n2/scores/${currentUser}/${idx}`, score);
  };

  // ══ RENDER RÉSULTATS ═══════════════════════════════
  function renderResults() {
    renderJFilter('j-results', 'results');
    const el = document.getElementById('results-list');
    const list = MATCHES.map((m, i) => ({ m, i })).filter(({ m }) => m.j === activeJ.results);
    el.innerHTML = list.map(({ m, i }) => {
      const res = getResult(i);
      const isPreset = !!PRESET_RESULTS[i];
      return `<div class="match-card">
        <div class="match-meta">${m.date} · ${m.time} ${isPreset ? '<span class="badge badge-lock">Pré-chargé</span>' : ''}</div>
        <div class="match-teams">${m.home} <span class="vs">vs</span> ${m.away}</div>
        <div class="score-row" style="margin-top:10px">
          <span class="score-lbl">Score réel :</span>
          <input class="score-in" type="number" min="0" max="99" id="rh${i}"
            value="${res ? res.h : ''}" placeholder="?" ${isPreset ? 'disabled' : ''}/>
          <span class="score-sep">–</span>
          <input class="score-in" type="number" min="0" max="99" id="ra${i}"
            value="${res ? res.a : ''}" placeholder="?" ${isPreset ? 'disabled' : ''}/>
          ${!isPreset ? `<button class="btn-validate" onclick="saveResult(${i})">Valider</button>` : ''}
          ${res && !isPreset ? '<span class="badge badge-ok">Saisi</span>' : ''}
        </div>
      </div>`;
    }).join('');
  }

  window.saveResult = async function (idx) {
    const h = document.getElementById('rh' + idx)?.value;
    const a = document.getElementById('ra' + idx)?.value;
    if (h === '' || a === '') return;
    const score = { h: parseInt(h), a: parseInt(a) };
    dbData.results[idx] = score;
    await writePath(`hb_n2/results/${idx}`, score);
  };

  // ══ RENDER CLASSEMENT ══════════════════════════════
  function renderLeaderboard() {
    // Stats perso
    const me = calcPoints(currentUser);
    document.getElementById('my-stats').innerHTML = `
      <div class="stat-card"><div class="stat-val">${me.pts}</div><div class="stat-lbl">Mes points</div></div>
      <div class="stat-card"><div class="stat-val">${me.correct}</div><div class="stat-lbl">1N2 corrects</div></div>
      <div class="stat-card"><div class="stat-val">${me.exact}</div><div class="stat-lbl">Scores exacts</div></div>
    `;

    const players = [...new Set([currentUser, ...Object.keys(dbData.pronos)])].filter(Boolean);
    const ranked = players.map(p => ({ name: p, ...calcPoints(p) }))
      .sort((a, b) => b.pts - a.pts || b.correct - a.correct || b.exact - a.exact);

    const medals = ['gold', 'silver', 'bronze'];
    const el = document.getElementById('leaderboard');
    if (!ranked.length) { el.innerHTML = '<div class="empty-state">Aucun participant pour l\'instant.</div>'; return; }

    el.innerHTML = ranked.map((p, i) => {
      const [bg, fg] = getUserColor(p.name);
      return `<div class="lb-row">
        <div class="lb-rank ${medals[i] || ''}">${i + 1}</div>
        <div class="lb-avatar" style="background:${bg};color:${fg}">${p.name.slice(0,2).toUpperCase()}</div>
        <div class="lb-name">${p.name} ${p.name === currentUser ? '<span class="lb-me">(moi)</span>' : ''}</div>
        <div class="lb-pts-wrap">
          <div class="lb-pts">${p.pts} pts</div>
          <div class="lb-sub">${p.exact} exact · ${p.correct} 1N2 · ${p.total} joués</div>
        </div>
      </div>`;
    }).join('');
  }

  function renderAll() {
    renderPronos();
    renderResults();
    renderLeaderboard();
  }

  // ── Events
  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.login();
  });
</script>
</body>
</html>
